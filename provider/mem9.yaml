identity:
  author: mem9-ai
  name: mem9
  label:
    en_US: mem9
    zh_Hans: mem9
  description:
    en_US: Long-term memory for AI agents powered by mem9.
    zh_Hans: 基于 mem9 的 AI 智能体长期记忆。
  icon: icon.svg
  tags:
    - utilities
credentials_for_provider:
  auth_mode:
    type: select
    required: true
    default: single_space
    options:
      - value: single_space
        label:
          en_US: Single space (configure API Key here)
          zh_Hans: 单空间（在此处配置 API Key）
      - value: multi_space
        label:
          en_US: Multi-space (configure API Key per workflow node)
          zh_Hans: 多空间（在每个工作流节点配置 API Key）
    label:
      en_US: Authorization Mode
      zh_Hans: 授权模式
    help:
      en_US: >-
        Single space: bind one mem9 space to this plugin install via the API
        Key field below. Multi-space: leave the API Key empty and provide
        it per call on each workflow node, so a single workflow can access
        multiple mem9 spaces.
      zh_Hans: >-
        单空间：通过下方 API Key 字段将一个 mem9 空间绑定到此插件安装。
        多空间：将 API Key 留空，在每个工作流节点的工具参数里单独配置，
        从而让一个工作流访问多个 mem9 空间。
  mem9_base_url:
    type: text-input
    required: false
    default: "https://api.mem9.ai"
    label:
      en_US: mem9 API Base URL
      zh_Hans: mem9 API 基础 URL
    help:
      en_US: Base URL of the mem9 API. Use default for hosted mem9.
      zh_Hans: mem9 API 的基础 URL。使用默认值连接托管版 mem9。
    placeholder:
      en_US: https://api.mem9.ai
  mem9_api_key:
    type: secret-input
    required: false
    label:
      en_US: API Key (leave empty in multi-space mode)
      zh_Hans: API 密钥（多空间模式下请留空）
    help:
      en_US: >-
        Your mem9 API key. Required in Single space mode. In Multi-space
        mode, leave this empty — configure the API Key on each workflow
        node instead.
      zh_Hans: >-
        你的 mem9 API 密钥。单空间模式下必填。多空间模式下请留空——
        在每个工作流节点上单独配置 API Key。
    placeholder:
      en_US: your-api-key
  mem9_agent_id:
    type: text-input
    required: false
    default: "dify"
    label:
      en_US: Agent ID
      zh_Hans: 智能体 ID
    help:
      en_US: Agent identifier sent with mem9 requests. Defaults to "dify".
      zh_Hans: 随 mem9 请求发送的智能体标识符。默认为 "dify"。
    placeholder:
      en_US: dify
tools:
  - tools/memory_search.yaml
  - tools/memory_store.yaml
extra:
  python:
    source: provider/mem9.py
