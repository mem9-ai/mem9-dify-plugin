identity:
  name: memory_store
  author: mem9-ai
  label:
    en_US: Memory Store
    zh_Hans: 记忆存储
description:
  human:
    en_US: Store content into mem9 long-term memory via smart extraction.
    zh_Hans: 通过智能提取将内容存储到 mem9 长期记忆中。
  llm: >-
    Save a durable fact about the user, the project, or shared context into
    long-term memory so it persists across conversations.


    Call this tool when:

    - The user states a preference, decision, plan, or stable fact (e.g.
    "I prefer Python", "ship by Friday", "team uses React").

    - The user provides identifying or biographical info (name, role, location).

    - A consequential decision is made that future conversations should
    remember.


    Do NOT call this tool for:

    - Transient context, casual greetings, or one-off task instructions.

    - Tool outputs or computations that can be re-derived.

    - Information only relevant to the current turn.

    - Restating questions the user just asked (questions are not facts).


    Calls are processed asynchronously by mem9's smart extraction pipeline.
    The stored memory is not immediately searchable — do not call
    memory_search for the same content in the next turn.
parameters:
  - name: content
    type: string
    required: true
    label:
      en_US: Content
      zh_Hans: 内容
    human_description:
      en_US: The content to store in memory.
      zh_Hans: 要存储到记忆中的内容。
    llm_description: >-
      The fact to remember, written as a short declarative statement (not a
      question, and not the user's raw utterance). Include the subject
      explicitly. The subject can be the user, the project, the team, or
      any shared entity.


      Good examples:

      - "User prefers Python"

      - "Project ships on Friday"

      - "Team uses React for the frontend"


      Avoid vague pronouns and transient phrasing. One fact per call; if
      the user shared multiple facts, call this tool multiple times.
    form: llm
  - name: api_key
    type: string
    required: false
    label:
      en_US: API Key (Multi-space mode)
      zh_Hans: API 密钥（多空间模式）
    human_description:
      en_US: >-
        mem9 API Key for this call. Required when the plugin Authorization
        Mode is Multi-space; ignored in Single space mode. For security,
        bind this to a Dify workspace environment variable
        (e.g. {{env.MEM9_API_KEY_TEAM_A}}) rather than pasting the key.
      zh_Hans: >-
        本次调用使用的 mem9 API 密钥。插件授权模式为多空间时必填；
        单空间模式下忽略。出于安全考虑，建议将此处绑定到 Dify 工作空间级
        环境变量（例如 {{env.MEM9_API_KEY_TEAM_A}}），而不是直接粘贴密钥。
    form: form
  - name: session_id
    type: string
    required: false
    label:
      en_US: Session ID
      zh_Hans: 会话 ID
    human_description:
      en_US: >-
        mem9 session scope. Bind to sys.conversation_id for per-conversation
        memory isolation.
      zh_Hans: mem9 会话作用域。绑定 sys.conversation_id 以实现按对话隔离记忆。
    form: form
extra:
  python:
    source: tools/memory_store.py
